<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flutter JSON → Dart Model Generator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Inter, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 24px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      animation: slideIn 0.5s ease;
    }

    .flutter-icon {
      width: 42px;
      height: 42px;
      transition: transform 0.3s ease;
    }

    .flutter-icon:hover {
      transform: rotate(-8deg) scale(1.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.7s ease;
    }

    .styled-input {
      min-width: 220px;
      padding: 14px 18px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: white;
      outline: none;
      font-size: 14px;
      transition: all 0.25s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .styled-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .styled-input:focus {
      border-color: rgba(99,102,241,0.7);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.18);
      transform: translateY(-1px);
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      font-size: 14px;
      cursor: pointer;
      transition: 0.25s ease;
      user-select: none;
    }

    .checkbox:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.11);
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #6366f1;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.25s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99,102,241,0.25);
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      height: calc(100vh - 240px);
      animation: fadeIn 0.8s ease;
    }

    #jsonEditor,
    #outputEditor {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      transition: 0.3s ease;
    }

    #jsonEditor:hover,
    #outputEditor:hover {
      transform: translateY(-2px);
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: rgba(34,197,94,0.95);
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        height: auto;
      }

      #jsonEditor,
      #outputEditor {
        min-height: 400px;
      }
    }
  </style>

  <script src="https://unpkg.com/monaco-editor@0.52.2/min/vs/loader.js"></script>
</head>
<body>

<div class="header">
  <svg class="flutter-icon" viewBox="0 0 24 24" fill="none">
    <path d="M14.314 0L2 12.314l3.686 3.686L21.686 0h-7.372Z" fill="#42A5F5"/>
    <path d="M5.686 16L9.372 19.686 21.686 7.372V0L5.686 16Z" fill="#1E88E5"/>
    <path d="M9.372 19.686L14.314 24h7.372L13.058 15.372l-3.686 4.314Z" fill="#42A5F5"/>
  </svg>
  <h1>JSON → Dart Model Generator</h1>
</div>

<div class="controls">
  <input id="classNameInput" class="styled-input" placeholder="Main class name" />

  <label class="checkbox">
    <input type="checkbox" id="usePrefixCheck" onchange="togglePrefixField()" />
    Prefix Child Classes
  </label>

  <input
    id="prefixInput"
    class="styled-input"
    placeholder="Prefix (e.g. Api)"
    style="display:none;"
  />

  <label class="checkbox">
    <input type="radio" name="modelStyle" id="manualStyle" checked />
    Manual
  </label>

  <label class="checkbox">
    <input type="radio" name="modelStyle" id="factoryStyle" />
    Factory
  </label>

  <label class="checkbox">
    <input type="checkbox" id="fromJsonCheck" checked />
    fromJson
  </label>

  <label class="checkbox">
    <input type="checkbox" id="toJsonCheck" checked />
    toJson
  </label>

  <button onclick="generateDart()">Generate Dart</button>
  <button onclick="copyGeneratedCode()">Copy Code</button>
</div>

<div class="container">
  <div id="jsonEditor"></div>
  <div id="outputEditor"></div>
</div>

<div id="toast" class="toast">Copied successfully ✓</div>

<script>
let jsonEditor;
let outputEditor;

require.config({
  paths: {
    vs: "https://unpkg.com/monaco-editor@0.52.2/min/vs"
  }
});

require(["vs/editor/editor.main"], function () {
  jsonEditor = monaco.editor.create(document.getElementById("jsonEditor"), {
    value: "{\n  \n}",
    language: "json",
    theme: "vs-dark",
    automaticLayout: true,
    minimap: { enabled: true },
    folding: true,
    lineNumbers: "on"
  });

  outputEditor = monaco.editor.create(document.getElementById("outputEditor"), {
    value: "",
    language: "dart",
    theme: "vs-dark",
    readOnly: true,
    automaticLayout: true
  });
});

function togglePrefixField() {
  const checkbox = document.getElementById("usePrefixCheck");
  const prefixInput = document.getElementById("prefixInput");

  prefixInput.style.display = checkbox.checked ? "block" : "none";
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 1800);
}

function toPascalCase(str) {
  return str.replace(/[_-](.)/g, (_, c) => c.toUpperCase())
            .replace(/\s+(.)/g, (_, c) => c.toUpperCase())
            .replace(/^(.)/, (_, c) => c.toUpperCase());
}

function getChildClassName(name) {
  const usePrefix = document.getElementById("usePrefixCheck").checked;
  const prefix = document.getElementById("prefixInput").value.trim();

  if (!usePrefix || !prefix) {
    return toPascalCase(name);
  }

  return `${toPascalCase(prefix)}${toPascalCase(name)}`;
}

function generateDart() {
  try {
    const json = JSON.parse(jsonEditor.getValue());

    const mainClass =
      document.getElementById("classNameInput").value.trim() ||
      "RootModel";

    const isFactory =
      document.getElementById("factoryStyle").checked;

    const includeFromJson =
      document.getElementById("fromJsonCheck").checked;

    const includeToJson =
      document.getElementById("toJsonCheck").checked;

    let output = `class ${toPascalCase(mainClass)} {\n`;

    for (const key in json) {
      const value = json[key];

      let type = "dynamic";

      if (typeof value === "string") type = "String";
      else if (typeof value === "number") type = "num";
      else if (typeof value === "boolean") type = "bool";
      else if (
        typeof value === "object" &&
        !Array.isArray(value)
      ) {
        type = getChildClassName(key);
      }

      output += isFactory
        ? `  final ${type}? ${key};\n`
        : `  ${type}? ${key};\n`;
    }

    output += `\n  ${toPascalCase(mainClass)}({\n`;

    for (const key in json) {
      output += `    this.${key},\n`;
    }

    output += `  });\n`;

    if (includeFromJson) {
      output += `
  ${isFactory ? "factory " : ""}
${toPascalCase(mainClass)}.fromJson(Map<String, dynamic> json) {
`;

      if (isFactory) {
        output += `    return ${toPascalCase(mainClass)}(\n`;

        for (const key in json) {
          output += `      ${key}: json['${key}'],\n`;
        }

        output += `    );\n`;
      } else {
        for (const key in json) {
          output += `    ${key} = json['${key}'];\n`;
        }
      }

      output += `  }\n`;
    }

    if (includeToJson) {
      output += `
  Map<String, dynamic> toJson() {
    return {
`;

      for (const key in json) {
        output += `      '${key}': ${key},\n`;
      }

      output += `    };
  }
`;
    }

    output += `}\n`;

    for (const key in json) {
      if (
        typeof json[key] === "object" &&
        !Array.isArray(json[key])
      ) {
        output += `\nclass ${getChildClassName(key)} {\n`;

        for (const nestedKey in json[key]) {
          output += `  dynamic? ${nestedKey};\n`;
        }

        output += `}\n`;
      }
    }

    outputEditor.setValue(output);
  } catch (e) {
    outputEditor.setValue(`// Invalid JSON\n// ${e.message}`);
  }
}

function copyGeneratedCode() {
  navigator.clipboard.writeText(outputEditor.getValue());
  showToast("Copied successfully ✓");
}
</script>

</body>
</html>
